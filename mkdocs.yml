site_name: kglite-docs
site_description: Agent-first PDF knowledge base on kglite + bge-m3
site_url: https://kglite-docs.readthedocs.io/
repo_url: https://github.com/kkollsga/kglite-docs
repo_name: kkollsga/kglite-docs
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google
            heading_level: 3
            members_order: source
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Workflows: workflows.md
  - Architecture: architecture.md
  - Performance: perf.md
  - Troubleshooting: troubleshooting.md
  - Publishing: publishing.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - API reference:
      - Corpus: api/corpus.md
      - Errors: api/errors.md
      - Types: api/types.md
  - Design history:
      - Initial plan: design-history/initial-plan-2026-05-28.md
