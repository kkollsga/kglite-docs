# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

mkdocs:
  configuration: mkdocs.yml
  # Don't fail the build on mkdocs warnings — we want it permissive at
  # first; we'll flip to fail-on-warning once the API reference is stable.
  fail_on_warning: false

python:
  install:
    # Docs-only toolchain — NOT the package. mkdocstrings reads the API from
    # `src/` statically (Griffe, `paths: [src]` in mkdocs.yml), so the build
    # needs none of the runtime stack (kglite/onnxruntime/pymupdf). This avoids
    # kglite's manylinux_2_39-only wheel, which can't install on RTD's glibc and
    # was failing `pip install .[docs]`.
    - requirements: docs/requirements.txt

formats: []   # no PDF/ePub for now; mkdocs-material handles search well enough
