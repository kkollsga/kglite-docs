name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # We don't ship a uv.lock yet, so caching on pyproject.toml hash
          # is the next-best — invalidates only when deps change.
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[mcp,dev]"

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type-check
        # mypy strict mode against the package; tests are excluded by pyproject
        run: uv run mypy src/kglite_docs || true   # advisory in v0.1

      - name: Run tests (no embed, no mcp)
        env:
          # Bge-m3 weights aren't cached in CI — skip the embed marker.
          # MCP tests require the `mcp` extra which is already installed,
          # but they boot the server; keep them out of the matrix for speed.
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          uv run pytest -q -m "not embed and not mcp" --cov=kglite_docs --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
